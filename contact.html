<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contact | Northwood Care</title>

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="simple-header">
  <a href="index.html">← Back to Home</a>
</header>

<section class="page-container">

  <h1>Contact Us</h1>

  <p class="page-intro">
    We'd love to hear from you. Please send us a message and a member
    of our team will get back to you shortly.
  </p>

  <form
    id="contactForm"
    action="https://script.google.com/macros/s/AKfycbzcKxfR4bR5TSeePnoSE8X8pDW_vEUURL429cus20l6Mx_E8DAaj29c87Q51ifLg-kXkg/exec"
    method="POST"
    target="hidden_iframe"
    class="contact-form"
  >

    <input
      type="text"
      name="name"
      placeholder="Your Name"
      required
    >

    <input
      type="email"
      name="email"
      placeholder="Your Email"
      required
    >

    <textarea
      rows="6"
      name="message"
      placeholder="Your Message"
      required
    ></textarea>

    <button type="submit" class="primary-btn">
      Send Message
    </button>

  </form>

  <iframe
    name="hidden_iframe"
    style="display:none;"
  ></iframe>

</section>

<script>
  const contactForm = document.getElementById("contactForm");

  contactForm.addEventListener("submit", function () {
    setTimeout(function () {
      alert("Thank you! Your message has been sent.");
      contactForm.reset();
    }, 700);
  });
</script>

</body>
</html>
