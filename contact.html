<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contact | Northwood Care</title>

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- HEADER -->
  <header class="simple-header">
    <a href="index.html">← Back to Home</a>
  </header>

  <!-- CONTACT SECTION -->
  <section class="page-container">

    <h1>Contact Us</h1>

    <p class="page-intro">
      We'd love to hear from you. Please send us a message and a member
      of our team will get back to you shortly.
    </p>

    <!-- CONTACT FORM -->
    <form
      id="contactForm"
      class="contact-form"
    >

      <!-- NAME -->
      <input
        type="text"
        name="name"
        placeholder="Your Name"
        required
      >

      <!-- EMAIL -->
      <input
        type="email"
        name="email"
        placeholder="Your Email"
        required
      >

      <!-- MESSAGE -->
      <textarea
        rows="6"
        name="message"
        placeholder="Your Message"
        required
      ></textarea>

      <!-- SUBMIT BUTTON -->
      <button
        type="submit"
        class="primary-btn"
      >
        Send Message
      </button>

    </form>

  </section>

  <!-- MAIN SCRIPT -->
  <script src="js/script.js"></script>

</body>
</html>
